<!DOCTYPE html>
<html>
<head>
  <title>BeforeYouSay</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: auto;
      padding: 40px;
    }
    textarea {
      width: 100%;
      height: 120px;
      margin-bottom: 10px;
    }
    button {
      margin: 5px;
      padding: 10px;
      cursor: pointer;
    }
    .output {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>BeforeYouSay</h1>
  <p>Paste your message and choose a mode.</p>

  <textarea id="message" placeholder="Type your message..."></textarea>

  <div>
    <button onclick="setMode('workplace')">Workplace</button>
    <button onclick="setMode('relationship')">Relationship</button>
    <button onclick="setMode('rizz')">Rizz</button>
    <button onclick="setMode('negotiation')">Negotiation</button>
  </div>

  <br>
  <button onclick="analyze()">Analyze</button>

  <div class="output" id="output">Result will appear here...</div>

  <script>
    let mode = "workplace";

    function setMode(m) {
      mode = m;
    }

    async function analyze() {
      const message = document.getElementById("message").value;

      const res = await fetch("http://localhost:3000/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, mode })
      });

      const data = await res.json();
      document.getElementById("output").innerText = data.result;
    }
  </script>

</body>
</html>
